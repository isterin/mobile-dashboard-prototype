# Local development infrastructure
# Usage: docker compose -f compose.local.yml up -d
# Or use: task dev:infra

services:
  postgres:
    image: postgres:18-alpine
    container_name: market-analysis-postgres
    environment:
      POSTGRES_USER: marketanalysis
      POSTGRES_PASSWORD: marketanalysis
      POSTGRES_DB: marketanalysis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marketanalysis"]
      interval: 5s
      timeout: 5s
      retries: 5


volumes:
  postgres_data:
